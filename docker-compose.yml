services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: repair_db
    environment:
      POSTGRES_DB: repair_db
      POSTGRES_USER: ${DB_USER:-repair_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-repair_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-repair_user} -d repair_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: repair_backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-repair_user}:${DB_PASSWORD:-repair_password}@postgres:5432/repair_db
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID:-}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-{}}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
    command: npm run dev --workspace=server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend (Development)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: repair_frontend
    ports:
      - "5173:5173"
      - "5174:5174"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - VITE_API_URL=http://localhost:3001/api

volumes:
  postgres_data:
    driver: local
