services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: repair_db
      POSTGRES_USER: repair_user
      POSTGRES_PASSWORD: repair_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repair_user -d repair_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://repair_user:repair_pass@db:5432/repair_db
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
